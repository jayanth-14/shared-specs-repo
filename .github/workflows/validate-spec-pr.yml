name: Validate incoming spec PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed spec files
        id: changed
        run: |
          FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'specs/OpenApi/**/*.json')
          echo "files<<SPEC_EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "SPEC_EOF" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        if: steps.changed.outputs.files != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Spectral lint
        if: steps.changed.outputs.files != ''
        run: |
          npm install -g @stoplight/spectral-cli@6.15.1
          echo "${{ steps.changed.outputs.files }}" | while read -r f; do
            [ -n "$f" ] && spectral lint "$f" --ruleset .spectral.yaml
          done

      - name: Set up Java
        if: steps.changed.outputs.files != ''
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Specmatic
        if: steps.changed.outputs.files != ''
        run: curl https://docs.specmatic.io/install-specmatic.sh | bash

      - name: Specmatic backward-compatibility check
        if: steps.changed.outputs.files != ''
        run: |
          java -Djava.awt.headless=true -jar "$HOME/.specmatic/specmatic.jar" \
            backward-compatibility-check --base-branch "origin/${{ github.base_ref }}" --target-path specs/OpenApi

  auto-merge:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ github.event.pull_request.number }}" --squash --repo "${{ github.repository }}"
